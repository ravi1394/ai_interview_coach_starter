<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>AI Interview Coach</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

font-family:Arial,sans-serif;

background:#0f172a;

color:white;

max-width:1100px;

margin:auto;

padding:20px;

}

h1{

text-align:center;

font-size:50px;

color:#38bdf8;

margin-bottom:25px;

}

.card{

background:#1e293b;

padding:25px;

margin-top:25px;

border-radius:20px;

box-shadow:

0 8px 25px rgba(0,0,0,0.35);

}

h2{

margin-bottom:15px;

color:#38bdf8;

}

button{

width:100%;

padding:15px;

background:#2563eb;

color:white;

border:none;

border-radius:12px;

cursor:pointer;

font-size:18px;

margin-top:12px;

transition:0.3s;

}

button:hover{

background:#1d4ed8;

transform:scale(1.02);

}

input,textarea{

width:100%;

padding:15px;

margin-top:10px;

border:none;

border-radius:12px;

background:#334155;

color:white;

font-size:16px;

}

pre{

background:#111827;

padding:15px;

border-radius:12px;

overflow:auto;

white-space:pre-wrap;

margin-top:15px;

color:#e2e8f0;

}

#questionBox{

font-size:30px;

font-weight:bold;

color:#38bdf8;

margin-top:20px;

}

.scoreCard{

display:flex;

gap:20px;

margin-top:20px;

}

.score{

flex:1;

background:#2563eb;

padding:25px;

border-radius:16px;

text-align:center;

font-size:22px;

}

.progress{

height:20px;

background:#334155;

border-radius:20px;

overflow:hidden;

margin-top:20px;

}

#bar{

height:100%;

width:0%;

background:#38bdf8;

transition:0.5s;

}

.small{

font-size:14px;

color:#94a3b8;

margin-top:10px;

}

</style>

</head>

<body>

<h1>

🎯 AI Interview Coach

</h1>



<!-- Upload Resume -->

<div class="card">

<h2>

📄 Upload Resume

</h2>

<input

type="file"

id="resume"

>

<button

onclick="uploadResume()"

>

Upload Resume

</button>

<div class="small">

Upload your PDF resume.

</div>

<pre id="uploadResult"></pre>

</div>





<!-- Interview -->

<div class="card">

<h2>

💬 Interview

</h2>



<div class="progress">

<div id="bar"></div>

</div>



<button

onclick="startInterview()"

>

Start Interview

</button>



<div id="questionBox">

</div>



<textarea

id="answer"

rows="6"

placeholder="Type your answer here...">

</textarea>



<button

onclick="startVoice()"

>

🎤 Start Speaking

</button>



<button

onclick="submitAnswer()"

>

Submit Answer

</button>



<pre id="answerResult"></pre>

</div>





<!-- Dashboard -->

<div class="card">

<h2>

📊 Dashboard

</h2>



<button

onclick="loadDashboard()"

>

Load Dashboard

</button>



<div class="scoreCard">

<div class="score">

Questions

<div id="qcount">

0

</div>

</div>



<div class="score">

Overall Score

<div id="overall">

0

</div>

</div>

</div>



<br>



<b>

Strengths

</b>



<pre

id="strengths"

>

</pre>



<b>

Weaknesses

</b>



<pre

id="weaknesses"

>

</pre>



<button

onclick="downloadReport()"

>

📄 Download Interview Report

</button>



</div>





<script>

const API=

"https://ai-interview-coach-starter.onrender.com";



let currentQuestion="";

let totalQuestions=0;

let currentIndex=0;





async function uploadResume(){



const file=

document

.getElementById(

"resume"

)

.files[0];



const fd=

new FormData();



fd.append(

"file",

file

);



const r=

await fetch(

API+

"/upload_resume",

{

method:"POST",

body:fd

}

);



const data=

await r.json();



totalQuestions=

data.questions.length;



let output="";



output+=

"✅ Resume Uploaded Successfully\n\n";



output+=

"Generated Questions:\n\n";



for(

let i=0;

i<data.questions.length;

i++

){

output+=

(i+1)

+". "

+

data.questions[i]

+

"\n\n";

}



document

.getElementById(

"uploadResult"

)

.textContent=

output;

}





async function startInterview(){



const r=

await fetch(

API+

"/start_interview",

{

method:"POST"

}

);



const data=

await r.json();



currentQuestion=

data.question;



currentIndex=1;



document

.getElementById(

"questionBox"

)

.innerHTML=

currentQuestion;



document

.getElementById(

"bar"

)

.style.width=

(

currentIndex

/

totalQuestions

)

*100

+"%";



}





async function submitAnswer(){



const payload={



question:

currentQuestion,



answer:

document

.getElementById(

"answer"

)

.value



};



const r=

await fetch(

API+

"/submit_answer",

{

method:"POST",



headers:{



"Content-Type":

"application/json"



},



body:



JSON.stringify(

payload

)



}

);



const data=

await r.json();



document

.getElementById(

"answerResult"

)

.textContent=

JSON.stringify(

data,

null,

2

);



if(

data.next_question

){



currentQuestion=

data.next_question;



currentIndex++;



document

.getElementById(

"questionBox"

)

.innerHTML=

currentQuestion;



document

.getElementById(

"answer"

)

.value="";



document

.getElementById(

"bar"

)

.style.width=

(

currentIndex

/

totalQuestions

)

*100

+"%";



}



else{



document

.getElementById(

"questionBox"

)

.innerHTML=



"✅ Interview Completed";



}



}





async function loadDashboard(){



const r=

await fetch(

API+

"/dashboard"

);



const data=

await r.json();



document

.getElementById(

"qcount"

)

.innerHTML=



data.questions_attempted;



document

.getElementById(

"overall"

)

.innerHTML=



data.overall_score;



document

.getElementById(

"strengths"

)

.textContent=



data.strengths.join(

", "

);



document

.getElementById(

"weaknesses"

)

.textContent=



data.weaknesses.join(

", "

);



}





function startVoice(){



const SpeechRecognition=

window.SpeechRecognition

||

window.webkitSpeechRecognition;



const recognition=

new SpeechRecognition();



recognition.lang=

"en-US";



recognition.interimResults=

false;



recognition.start();



recognition.onresult=

function(event){



const transcript=

event

.results[0][0]

.transcript;



document

.getElementById(

"answer"

)

.value=



transcript;



}



recognition.onerror=

function(){



alert(

"Voice Recognition Failed"

);



}



}





function downloadReport(){



window.open(

API+

"/download_report"

);



}



</script>

</body>

</html>
